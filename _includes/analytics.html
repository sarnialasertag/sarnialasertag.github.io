<div id="cookie-banner" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #320775; border-top: 1px solid #44148f; padding: 24px 16px; z-index: 50;">
    <div style="max-width: 1280px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; align-items: center;">
        <span style="color: #eee;">
            We use cookies to understand how visitors use our site and to help us improve it. No ads, just insights to make your experience better.
            <a href="/privacy-policy.html" style="color: #6cf7f3; text-decoration: underline;">Learn More</a>.
        </span>
        <div style="display: flex; gap: 16px;">
            <button id="accept-cookies-btn" style="padding: 8px 24px; background: #5ede58; color: #090909; border: none; border-radius: 9999px; cursor: pointer; font-weight: bold;">
                Accept
            </button>
            <button id="decline-cookies-btn" style="padding: 8px 24px; border: 1px solid #be95ff; color: #be95ff; background: transparent; border-radius: 9999px; cursor: pointer;">
                Decline
            </button>
        </div>
    </div>
</div>

<script>
    function loadGoogleAnalytics() {
        var script = document.createElement("script");
        script.async = true;
        script.src = "https://www.googletagmanager.com/gtag/js?id=G-G2VXSD6SG9";
        document.head.appendChild(script);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-G2VXSD6SG9', { 'anonymize_ip': true });
    }

    document.addEventListener('DOMContentLoaded', function () {
        const banner = document.getElementById('cookie-banner');
        const acceptBtn = document.getElementById('accept-cookies-btn');
        const declineBtn = document.getElementById('decline-cookies-btn');

        const cookiesAccepted = localStorage.getItem('cookiesAccepted');
        if (cookiesAccepted === null) {
            banner.style.display = 'flex';
        } else if (cookiesAccepted === 'true') {
            loadGoogleAnalytics();
        }

        acceptBtn.addEventListener('click', function () {
            localStorage.setItem('cookiesAccepted', 'true');
            loadGoogleAnalytics();
            banner.style.display = 'none';
        });

        declineBtn.addEventListener('click', function () {
            localStorage.setItem('cookiesAccepted', 'false');
            banner.style.display = 'none';
        });
    });
</script>
