<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Brand Colors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .toast {
            transform: translateX(-50%) translateY(100px);
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="bg-[#090909] text-white pb-20">

    <header class="py-12 px-6 max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold tracking-tight mb-2">Arena Brand Palette</h1>
        <p class="text-gray-400">Click any color to copy the hex code to your clipboard.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 space-y-12" id="palette-container"></main>

    <div id="toast" class="toast fixed bottom-8 left-1/2 bg-white text-black px-6 py-3 rounded-full shadow-2xl font-bold text-sm z-50 pointer-events-none opacity-0">
        Copied to clipboard!
    </div>

    <script>
        const groups = [
            {
                name: "Purples & Lavenders",
                colors: [
                    { name: 'arena-dark-purple', hex: '#320775' },
                    { name: 'arena-purple', hex: '#44148f' },
                    { name: 'arena-deep-purple', hex: '#25005f' },
                    { name: 'arena-deep-purple-dark', hex: '#7033cd' },
                    { name: 'arena-lavender', hex: '#be95ff' },
                    { name: 'arena-light-purple', hex: '#d0a4e1' }
                ]
            },
            {
                name: "Blues & Teals",
                colors: [
                    { name: 'arena-dark-blue', hex: '#14088e' },
                    { name: 'arena-blue', hex: '#21A9FC' },
                    { name: 'arena-blue-dark', hex: '#1b90d2' },
                    { name: 'arena-pale-blue', hex: '#3292e0' },
                    { name: 'arena-light-blue', hex: '#8ac2d9' },
                    { name: 'arena-teal', hex: '#6cf7f3' }
                ]
            },
            {
                name: "Magentas & Pinks",
                colors: [
                    { name: 'arena-magenta', hex: '#990099' },
                    { name: 'arena-pale-magenta', hex: '#B5267E' },
                    { name: 'arena-pale-magenta-dark', hex: '#971d6f' },
                    { name: 'arena-pink', hex: '#ffb0db' }
                ]
            },
            {
                name: "Greens & Yellows",
                colors: [
                    { name: 'arena-green', hex: '#5ede58' },
                    { name: 'arena-green-dark', hex: '#1eac16' },
                    { name: 'arena-yellow', hex: '#edf763' },
                    { name: 'arena-yellow-dark', hex: '#e4d700' }
                ]
            },
            {
                name: "Neutrals",
                colors: [
                    { name: 'arena-black', hex: '#090909' },
                    { name: 'arena-dark-gray', hex: '#333' },
                    { name: 'arena-light-gray', hex: '#eee' },
                    { name: 'arena-white', hex: '#fff' }
                ]
            }
        ];

        const container = document.getElementById('palette-container');
        const toast = document.getElementById('toast');

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            toast.classList.add('show', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('show', 'opacity-100');
            }, 2000);
        }

        groups.forEach(group => {
            const section = document.createElement('section');
            section.innerHTML = `
                <h2 class="text-xl font-semibold mb-6 pb-2 border-b border-gray-800 text-gray-300">${group.name}</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    ${group.colors.map(color => `
                        <button onclick="copyToClipboard('${color.hex}')" class="group flex flex-col text-left focus:outline-none transition-transform active:scale-95">
                            <div class="w-full h-32 rounded-xl shadow-sm mb-3 group-hover:ring-2 ring-white/20 transition-all border border-white/5" style="background-color: ${color.hex}"></div>
                            <span class="text-sm font-bold truncate lowercase">${color.name.replace('arena-', '')}</span>
                            <span class="text-xs text-gray-500 font-mono uppercase tracking-wider">${color.hex}</span>
                        </button>
                    `).join('')}
                </div>
            `;
            container.appendChild(section);
        });
    </script>
</body>
</html>
